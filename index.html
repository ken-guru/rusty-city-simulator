<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City Sim</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* Loading indicator shown until WASM initialises */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
            font-family: sans-serif;
            font-size: 1.4rem;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading">Loading City Sim…</div>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <script>
        // Hide the loading indicator once the WASM module starts rendering.
        const observer = new MutationObserver(() => {
            const canvas = document.querySelector('canvas');
            if (canvas) {
                document.getElementById('loading').style.display = 'none';
                observer.disconnect();
            }
        });
        observer.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>

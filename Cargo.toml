[package]
name = "city_sim"
version = "0.4.0"
edition = "2021"

[dependencies]
bevy = { version = "0.15", features = ["dynamic_linking"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.10"
uuid = { version = "1.0", features = ["v4", "serde"] }
pathfinding = "4.0"

[profile.dev]
opt-level = 1

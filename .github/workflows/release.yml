name: Release

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libudev-dev \
            libasound2-dev \
            pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Check (no warnings)
        run: cargo build --no-default-features
        env:
          RUSTFLAGS: "-D warnings"
      - name: Test
        run: cargo test

  build-macos:
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build arm64
        run: cargo build --release --no-default-features --target aarch64-apple-darwin
        env:
          RUSTFLAGS: "--remap-path-prefix ${{ github.workspace }}=/source"
      - name: Build x86_64
        run: cargo build --release --no-default-features --target x86_64-apple-darwin
        env:
          RUSTFLAGS: "--remap-path-prefix ${{ github.workspace }}=/source"
      - name: Create universal binary
        run: |
          lipo -create -output city_sim_macos \
            target/aarch64-apple-darwin/release/city_sim \
            target/x86_64-apple-darwin/release/city_sim
      - uses: actions/upload-artifact@v4
        with:
          name: city_sim_macos
          path: city_sim_macos

  build-windows:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build --release --no-default-features
        env:
          RUSTFLAGS: "--remap-path-prefix ${{ github.workspace }}=/source"
      - uses: actions/upload-artifact@v4
        with:
          name: city_sim_windows
          path: target/release/city_sim.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --latest \
            artifacts/city_sim_macos/city_sim_macos \
            "artifacts/city_sim_windows/city_sim.exe" \
          || gh release upload "$TAG" \
               artifacts/city_sim_macos/city_sim_macos \
               "artifacts/city_sim_windows/city_sim.exe" \
               --clobber
